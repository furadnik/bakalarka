name: Build The Thesis
on:
  push:
    branches:
      - "master"
jobs:
  build_latex:
    runs-on: archlinux
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v2
      - name: Make Thesis
        run: |
          ln -snf /usr/share/zoneinfo/Europe/Prague /etc/localtime && echo Europe/Prague > /etc/timezone
          pacman -Syu texlive-langczechslovak texlive-latexextra texlive-mathscience git make --noconfirm
          sed -i 's/{\\textcolor.*/{}/' macros.tex
          make
      - uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          prerelease: false
          title: "Automatic Release"
          files: |
            thesis.pdf
            abstract.pdf
